services:
  postgres:
    image: postgres:16-alpine
    container_name: subscription-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-subscription_db}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subscription-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
      # GitHub OAuth配置（多认证方式支持）
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3000/api/auth/callback/github}
      # 管理员初始化配置（必填，执行 seed 时使用）
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      APP_NAME: ${APP_NAME:-Subscription Manager}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Subscription Manager}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres-backup:
    image: postgres:16-alpine
    container_name: subscription-db-backup
    profiles: ["backup"]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-subscription_db}
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: >
      while true; do
        pg_dump -h postgres -U postgres "$${POSTGRES_DB}" | gzip > /backups/subscription-$$(date +%Y%m%d%H%M%S).sql.gz;
        find /backups -name "subscription-*.sql.gz" -mtime +7 -delete;
        sleep 86400;
      done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
